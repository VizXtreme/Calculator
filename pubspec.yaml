name: calculator
description: A modern Flutter calculator application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  logger: ^2.0.2+1
  flutter_svg: ^2.0.9
  math_expressions: ^2.5.0
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runners: ^2.1.10
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-3: true
  assets:
    - assets/icons/
